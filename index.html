<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f3f3f3;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card img{
    width:100%;
    aspect-ratio:4/5;
    object-fit:cover;
    display:block;
}

.content{
    padding:18px;
    text-align:center;
}

.content h2{
    font-size:20px;
    color:#222;
    margin-bottom:15px;
}

.buy{
    display:block;
    width:100%;
    background:#FFA41C;
    color:#111;
    text-decoration:none;
    font-weight:bold;
    padding:14px;
    border-radius:999px;
    border:1px solid #FF8F00;
}

.buy:hover{
    background:#F08804;
}

@media(max-width:700px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>
<body>

<div class="container">

<div class="card">
<img src="top.jpg" alt="Crochet Knit Sweater">
<div class="content">
<h2>Crochet Knit Sweater</h2>
<a class="buy" href="https://fktr.in/0vXVQ3r" target="_blank">Buy Now</a>
</div>
</div>

<div class="card">
<img src="jeans.jpg" alt="Wide Leg Black Jeans">
<div class="content">
<h2>Wide Leg Black Jeans</h2>
<a class="buy" href="https://affiliate.meesho.com/collection/NTg5NTMwNzo6Ojo6Om5vcm1hbA==" target="_blank">Buy Now</a>
</div>
</div>

<div class="card">
<img src="shoes.jpg" alt="Casual Sneakers">
<div class="content">
<h2>Casual Sneakers</h2>
<a class="buy" href="https://affiliate.meesho.com/collection/NTg5NTg3MDo6Ojo6Om5vcm1hbA==" target="_blank">Buy Now</a>
</div>
</div>

<div class="card">
<img src="hair-clips.jpg" alt="Hair Clip Set">
<div class="content">
<h2>Hair Clip Set</h2>
<a class="buy" href="https://affiliate.meesho.com/collection/NTg5NTEzNDo6Ojo6Om5vcm1hbA==" target="_blank">Buy Now</a>
</div>
</div>

</div>

</body>
</html>
