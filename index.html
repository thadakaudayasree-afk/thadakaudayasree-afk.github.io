<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f5f5;
    padding:25px;
}

.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    aspect-ratio:4/5;
    object-fit:cover;
    display:block;
    background:#fff;
}

.content{
    padding:18px;
    text-align:center;
}

.content h2{
    font-size:20px;
    margin-bottom:18px;
    color:#222;
    font-weight:600;
}

/* Amazon Style Button */

.buy{
    display:block;
    width:100%;
    padding:13px;
    background:#FFA41C;
    color:#111;
    text-decoration:none;
    font-size:16px;
    font-weight:bold;
    border-radius:999px;
    border:1px solid #FF8F00;
    transition:.25s;
}

.buy:hover{
    background:#F08804;
    border-color:#E47911;
}

.buy:active{
    transform:scale(.98);
}

@media(max-width:600px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<div class="container">

<!-- Sweater -->
<div class="card">
<img src="tshirt.png" alt="Crochet Knit Sweater">
<div class="content">
<h2>Crochet Knit Sweater</h2>
<a class="buy" href="https://fktr.in/0vXVQ3r" target="_blank">
Buy Now
</a>
</div>
</div>

<!-- Jeans -->
<div class="card">
<img src="Jeans.png" alt="Wide Leg Black Jeans">
<div class="content">
<h2>Wide Leg Black Jeans</h2>
<a class="buy" href="https://affiliate.meesho.com/collection/NTg5NTMwNzo6Ojo6Om5vcm1hbA==" target="_blank">
Buy Now
</a>
</div>
</div>

<!-- Sneakers -->
<div class="card">
<img src="Sneakers2.png" alt="Casual Sneakers">
<div class="content">
<h2>Casual Sneakers</h2>
<a class="buy" href="https://affiliate.meesho.com/collection/NTg5NTg3MDo6Ojo6Om5vcm1hbA==" target="_blank">
Buy Now
</a>
</div>
</div>

<!-- Hair Clips -->
<div class="card">
<img src="hairclips.png" alt="Hair Clip Set">
<div class="content">
<h2>Hair Clip Set</h2>
<a class="buy" href="https://affiliate.meesho.com/collection/NTg5NTEzNDo6Ojo6Om5vcm1hbA==" target="_blank">
Buy Now
</a>
</div>
</div>

</div>

</body>
</html>
