<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f6f6f6;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
display:block;
}

.content{
padding:18px;
text-align:center;
}

.content h2{
font-size:20px;
margin-bottom:15px;
color:#222;
}

.buy-btn{
display:inline-block;
background:#000;
color:#fff;
text-decoration:none;
padding:12px 28px;
border-radius:30px;
font-weight:bold;
transition:.3s;
}

.buy-btn:hover{
background:#444;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
<img src="images/top.jpg" alt="Crochet Knit Crop Sweater">
<div class="content">
<h2>Crochet Knit Crop Sweater</h2>
<a href="https://fktr.in/G9QJGN9">Buy Now</a>
</div>
</div>

<div class="card">
<img src="images/jeans.jpg" alt="Wide Leg Black Jeans">
<div class="content">
<h2>Wide Leg Black Jeans</h2>
<a href="https://affiliate.meesho.com/collection/NTg5NTMwNzo6Ojo6Om5vcm1hbA==">Buy Now</a>
</div>
</div>

<div class="card">
<img src="images/shoes.jpg" alt="Casual Platform Sneakers">
<div class="content">
<h2>Casual Platform Sneakers</h2>
<a href="https://affiliate.meesho.com/collection/NTg5NTg3MDo6Ojo6Om5vcm1hbA==">Buy Now</a>
</div>
</div>

<div class="card">
<img src="images/hair-clips.jpg" alt="Elegant Hair Clip Set">
<div class="content">
<h2>Elegant Hair Clip Set</h2>
<a href="#" class="buy-btn">Buy Now</a>
</div>
</div>

</div>

</body>
</html>
