<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Picks</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.card{
background:#fff;
border-radius:15px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
border-radius:12px;
}

.price{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

button{
background:#ff9800;
color:#fff;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
width:100%;
}
</style>
</head>

<body>

<h1>✨ Trending Fashion Picks ✨</h1>

<div class="container">

<div class="card">
<img src="tshirt.png">
<h2>Vintage Oversized T-Shirt</h2>
<div class="price">₹234</div>
<button onclick="window.open('https://fktr.in/1q7ZwM4')">
Buy Now
</button>
</div>

<div class="card">
<img src="Jeans.png">
<h2>Wide Leg Black Jeans</h2>
<div class="price">₹539</div>
<button onclick="window.open('https://fktr.in/5ubi8aP')">
Buy Now
</button>
</div>

<div class="card">
<img src="Sneakers.png">
<h2>Chunky Sneakers</h2>
<div class="price">₹333</div>
<button onclick="window.open('https://fktr.in/bc5mkrx')">
Buy Now
</button>
</div>

</div>

</body>
</html>
